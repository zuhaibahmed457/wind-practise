version: '3.9'
services:
  redis:
    container_name: apis_eb_redis
    image: 'bitnami/redis:latest'
    ports:
      - 6380:6379
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    volumes:
      - 'apis_redis_data_eb:/bitnami'

volumes:
  apis_redis_data_eb:
    external: true


# if you get volume error run this command
# docker volume create apis_redis_data_eb

# if you run docker-compose file for first time then run this command
# docker compose up -d